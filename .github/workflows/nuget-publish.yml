name: NuGet Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore DeathByCaptcha/DeathByCaptcha/DeathByCaptcha.csproj

      - name: Build
        run: dotnet build DeathByCaptcha/DeathByCaptcha/DeathByCaptcha.csproj -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack DeathByCaptcha/DeathByCaptcha/DeathByCaptcha.csproj \
            -c Release --no-build \
            -o artifacts/nuget

      # Exchanges the GitHub OIDC token for a short-lived NuGet API key.
      # No stored secrets needed — configure a Trusted Publisher policy on nuget.org:
      #   https://www.nuget.org/account/trusted-publishers
      #   Owner: deathbycaptcha  |  Repository: deathbycaptcha-api-client-dotnet
      #   Workflow file: nuget-publish.yml
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USERNAME }}

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
