name: Coverage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore dbc_api_net.sln

      - name: Build
        run: dotnet build dbc_api_net.sln -c Release --no-restore

      - name: Run coverage tests (net10)
        run: |
          dotnet test DeathByCaptcha/DeathByCaptcha.Tests/DeathByCaptcha.Tests.csproj \
            -c Release --no-build -f net10.0 \
            --filter "Category!=Integration" \
            /p:CollectCoverage=true \
            /p:CoverletOutput=./TestResults/coverage/ \
            /p:CoverletOutputFormat=json,cobertura \
            /p:Exclude="[SimpleJson*]*"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-net10
          path: |
            DeathByCaptcha/DeathByCaptcha.Tests/TestResults/coverage/*
          if-no-files-found: error

      - name: Generate coverage badge payload
        run: |
          set -euo pipefail

          report="DeathByCaptcha/DeathByCaptcha.Tests/TestResults/coverage/coverage.cobertura.xml"
          line_rate=$(grep -o 'line-rate="[0-9.]*"' "$report" | head -n1 | cut -d'"' -f2)
          coverage_percent=$(awk -v rate="$line_rate" 'BEGIN { printf "%.1f", rate * 100 }')

          color="red"
          awk -v pct="$coverage_percent" 'BEGIN { exit !(pct >= 90) }' && color="brightgreen" || true
          awk -v pct="$coverage_percent" 'BEGIN { exit !(pct >= 80 && pct < 90) }' && color="green" || true
          awk -v pct="$coverage_percent" 'BEGIN { exit !(pct >= 70 && pct < 80) }' && color="yellow" || true
          awk -v pct="$coverage_percent" 'BEGIN { exit !(pct >= 60 && pct < 70) }' && color="orange" || true

          mkdir -p .github/badges
          cat > .github/badges/coverage-net10.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage net10",
            "message": "${coverage_percent}%",
            "color": "${color}"
          }
          EOF

      - name: Publish coverage badge payload
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          workdir="$(mktemp -d)"

          git clone --depth 1 --branch badges "$repo_url" "$workdir" || {
            git clone --depth 1 "$repo_url" "$workdir"
            cd "$workdir"
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
            touch .gitkeep
            git add .gitkeep
            git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m 'Initialize badges branch'
            git push origin badges
          }

          cd "$workdir"
          mkdir -p .github/badges
          cp "${{ github.workspace }}/.github/badges/coverage-net10.json" .github/badges/coverage-net10.json
          git add .github/badges/coverage-net10.json

          if git diff --cached --quiet -- .github/badges/coverage-net10.json; then
            echo "Coverage badge payload unchanged."
            exit 0
          fi

          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m 'Update coverage badge payload'
          git push origin badges
